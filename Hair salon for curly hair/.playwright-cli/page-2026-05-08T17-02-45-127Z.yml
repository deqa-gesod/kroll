        - generic [ref=e601]:
          - paragraph [ref=e602]: Before you come in
          - heading "Arrive dry. On the natural pattern." [level=2] [ref=e603]
          - paragraph [ref=e604]: We cut dry, on what your hair actually does — not what it does once we've stretched it under water. Coming in prepped means we get to the cut faster, and you get the time on the part that matters.
        - generic [ref=e605]:
          - generic [ref=e606]:
            - generic [ref=e607]:
              - generic [ref=e608]: "01"
              - heading "Wash 24 — 48h before." [level=3] [ref=e609]
            - paragraph [ref=e610]: Day-2 hair tells the truth about your pattern. Day-of-wash hair lies.
          - generic [ref=e611]:
            - generic [ref=e612]:
              - generic [ref=e613]: "02"
              - heading "Detangle gently." [level=3] [ref=e614]
            - paragraph [ref=e615]: Wide-tooth comb on damp, conditioner-coated hair. Or fingers. Never on bone-dry hair.
          - generic [ref=e616]:
            - generic [ref=e617]:
              - generic [ref=e618]: "03"
              - heading "Minimal product." [level=3] [ref=e619]
            - paragraph [ref=e620]: Leave-in is fine. Skip heavy gels, custards or mousse on the day. We need to read the curl, not the cast.
          - generic [ref=e621]:
            - generic [ref=e622]:
              - generic [ref=e623]: "04"
              - heading "No clips. No buns. No braids." [level=3] [ref=e624]
            - paragraph [ref=e625]: Hair down, on the natural pattern, the way it sits. Imprints take ten minutes off your appointment.
          - generic [ref=e626]:
            - generic [ref=e627]:
              - generic [ref=e628]: "05"
              - heading "Bring a reference." [level=3] [ref=e629]
            - paragraph [ref=e630]: A photo of you on a good day, or someone with a similar pattern, helps us calibrate. Not required — useful.
          - generic [ref=e631]:
            - generic [ref=e632]:
              - generic [ref=e633]: "06"
              - heading "Allow time." [level=3] [ref=e634]
            - paragraph [ref=e635]: We hold space for the chair to be unhurried. There is rarely anyone waiting behind you.
