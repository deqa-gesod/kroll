        - list [ref=e642]:
          - listitem [ref=e643]:
            - generic [ref=e644]: Keratin treatments
            - generic [ref=e645]: Incompatible with our curl-affirming positioning. We won't book it, even if asked.
          - listitem [ref=e646]:
            - generic [ref=e647]: Chemical relaxers
            - generic [ref=e648]: Same. We don't relax curls. Other Oslo salons can — we are not them.
          - listitem [ref=e649]:
            - generic [ref=e650]: Wet cutting
            - generic [ref=e651]: Stretches the curl, hides the pattern, returns the wrong shape when the hair springs back. We dry-cut, always.
          - listitem [ref=e652]:
            - generic [ref=e653]: Lashes, nails, brows
            - generic [ref=e654]: Specialism is the brand. Curls are the work. Anything else is somewhere else.
          - listitem [ref=e655]:
