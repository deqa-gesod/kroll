              - paragraph [ref=e74]: Tørt. På det naturlige mønsteret. Vi leser krølltype, tetthet, porøsitet og veksretning før saksen kommer fram — og vi skriver det ned. Samme hår på en annen dag forteller en annen historie; vi klipper det som faktisk er foran oss, ikke fotografiet fra forrige time.
