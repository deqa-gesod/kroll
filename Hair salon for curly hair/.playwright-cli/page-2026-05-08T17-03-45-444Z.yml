              - heading "Ulike regler for ulike soner." [level=3] [ref=e85]
              - paragraph [ref=e86]: Vi markerer fire soner — topplag, underlag, nakke, tinning — og klippen følger ulike regler i hver. Topplaget rammer inn; underlaget holder formen; nakken setter silhuetten; tinningen er der lineupen lever. Kartet er det som gjør at samme klipp fungerer på Type 2A og Type 4C.
