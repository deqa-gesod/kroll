      - generic [ref=e225]:
        - paragraph [ref=e226]: Hvorfor tørr
        - generic [ref=e227]:
          - heading "Vått hår er en annen form enn håret ditt." [level=2] [ref=e228]
          - generic [ref=e229]:
            - paragraph [ref=e230]: En Type 4-coil klippet våt, under spenning, kommer tilbake på halve lengden når den tørker. En Type 2-bølge klippet våt og børstet rett, kommer tilbake for kort i topplaget og ujevn i nakken. Håret går tilbake til sitt mønster; klippen skulle vært bygget for det mønsteret fra starten.
            - paragraph [ref=e231]: Tørr klipping er tregere, vanskeligere, og grunnen til at de fleste stylister ikke tilbyr det. Det er også den eneste måten å klippe for et krøllmønster på, istedenfor mot det. Vi lærte det på Curl Bar, raffinerte det på Devachan og Hair Rules, og vi avviker ikke fra det.
      - generic [ref=e233]:
        - generic [ref=e234]:
          - paragraph [ref=e235]: For menn
          - heading "Samme fem trinn. Skarpere kanter." [level=2] [ref=e236]
        - generic [ref=e238]:
          - paragraph [ref=e239]: The Sculpt Cut tar samme vurdering, samme sonekart, samme tørre krølle-for-krølle-arbeid på toppen — og legger til maskinpresisjon for fade og lineup. Én stol. Én time. Fade og krøller er ikke to ulike ferdigheter levert til to ulike personer. Det er hele poenget.
