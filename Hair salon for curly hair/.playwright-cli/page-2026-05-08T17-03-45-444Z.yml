          - heading "Andre Walker. Type 2A til 4C." [level=2] [ref=e134]
        - paragraph [ref=e136]: Andre Walker — Oprahs stylist i tjuefem år — publiserte denne typologien i 1997. Den er ikke hele sannheten (de fleste hoder har to-tre mønstre samtidig, og porøsitet betyr like mye som type), men det er det felles vokabularet krøll-verdenen bruker. Vi leser den dag én, foran speilet, med deg. Så går vi i gang.
