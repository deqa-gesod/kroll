          - paragraph [ref=e39]: Med én setning
          - paragraph [ref=e40]: Hvert krøllmønster er den samme jobben gjort med kunnskap — og kunnskap er noe du går og henter, ikke noe du venter på.
        - paragraph [ref=e41]: — Vanessa Jackson
      - generic [ref=e44]:
