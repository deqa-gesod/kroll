              - paragraph [ref=e113]: Vask, balsam, leave-in, definisjons-produkt. Uansett hvilken rutine — det er den du kan kjøpe på vei ut og gjenskape en tirsdag morgen før jobb. Vi gjør ikke salong-finishes som krever tre produkter du ikke får tak i Norge.
