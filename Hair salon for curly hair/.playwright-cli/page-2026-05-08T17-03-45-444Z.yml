          - heading "The Jackson Cut." [level=1] [ref=e34]
          - paragraph [ref=e35]: En navngitt, egen, tørr klippemetode for Type 2 — 4-hår. Klippen for kvinner, Sculpt Cut for menn, begge utviklet fra de samme fem trinnene. Dette er hva vi mener med det.
