              - paragraph [ref=e100]: Hver krølle tas individuelt, på sitt eget mønster, aldri strukket mellom fingrene, aldri våt. Formen bygges fra tilbakefjæringen, ikke mot den. Dette er den tregeste delen av timen og den jobben hviler på.
