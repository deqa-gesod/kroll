              - generic [ref=e112]:
                - paragraph [ref=e113]: After the first day many years ago that go-to curly hair expert Shai Amiel was handed a diffuser by the curly headed boss he was then assisting and told, “dry my curly hair,” Shai was fascinated. He saw that curly hair must be handled differently than straight hair, and he began a search for the special product, cut and color that would give curly hair the look he wanted.
