    - generic [ref=e85]:
      - generic [ref=e86]:
        - heading "Texture authority. Industry visionary." [level=5] [ref=e89]
        - generic [ref=e91]:
          - 'heading "Dickey is widely recognized for helping to create a new category in beauty: texture-specific hair care. named one of The 50 Most Influential People in the Multicultural Market by Beauty Inc." [level=2] [ref=e92]'
          - heading "To the New York Times, he's a \"Style Svengali.\" To Ebony, a member of their Power 100." [level=2] [ref=e93]
          - heading "To the clients who've trusted him for decades, he's simply the only person who ever understood their hair." [level=2] [ref=e94]
      - generic [ref=e97]:
        - heading "The story" [level=5] [ref=e101]
        - generic [ref=e103]:
          - generic [ref=e106]:
            - img "A young man posed in front of a window wearing a striped shirt" [ref=e109]
            - generic [ref=e111]:
              - heading "The beginning" [level=2] [ref=e113]
              - paragraph [ref=e115]: Dickey trained at the legendary houses of Oribe, John Frieda & Louis Licari in NYC during the late 80s and early 90s, the most prestigious addresses in the industry. There, he also began his editorial career with the Wall Group from Italian Vogue to Ellen von Unwerth and COVERGIRL Campaigns from the inside. Dickey began to discover how the world saw beauty and its inclusion deficit.
          - generic [ref=e122]:
            - heading "The product line" [level=2] [ref=e124]
            - paragraph [ref=e126]: To prove that texture-specific formulas weren’t a niche, he created a new category that was the majority. Dickey launched the Hair Rules product line in 2007. Nearly two decades later, he scaled it from an Indie favorite to the shelves of Bluemercury, Target, Ulta, and Walgreens. The multi-textural market existed. He built the proof.
          - generic [ref=e133]:
            - heading "The book" [level=2] [ref=e135]
            - paragraph [ref=e137]: In 2003, he wrote Hair Rules! - the first real comprehensive guide to kinky, curly, and wavy hair. Not a style book. A care manual. The “care tag” that the industry had never bothered to create. In its 3rd printing, Hair Rules! became required reading at FIDM in Los Angeles, a credited college course, “Fundamentals of Body & Haircare.”
          - generic [ref=e144]:
            - heading "Pro artistry" [level=2] [ref=e146]
            - paragraph [ref=e148]: Dickey's bold and imaginative styles have graced numerous publications, including Vogue, Vanity Fair, Essence, Glamour, Vibe, and Harper’s Bazaar. Mastering the mystery and artistry of textures, Dickey has created iconic styles for Alicia Keys, Michelle Obama, Kelis, Rihanna, and Sarah Jessica Parker.
          - generic [ref=e155]:
            - heading "The Studio" [level=2] [ref=e157]
            - paragraph [ref=e159]: "In 2009, Hair Rules Studio opened. Built on a heritage of beauty education & community, New York, LA, Atlanta, and virtual for everyone else, it remains the heart of everything: where technique is refined, where clients are understood, and where consulting and Lab work is tested in real time."
    - generic [ref=e166]:
      - heading "The expertise" [level=5] [ref=e169]
      - generic [ref=e170]:
        - heading "Four decades behind the camera and the chair with the world's most iconic hair." [level=2] [ref=e172]
        - generic [ref=e173]:
          - paragraph [ref=e179]: Trusted by many, like Michelle Obama, Alicia Keys, Solange, Sarah Jessica Parker, Rihanna, Kelis, Faye Dunaway, and more.
          - paragraph [ref=e185]: Author to Hair Rules!, a new guide in haircare, added to the FIDM primary curriculum.
          - paragraph [ref=e191]: Almost 2 decades scaling a loved indie brand from concept to Ulta, Target, and Walgreens.
          - paragraph [ref=e197]: On-set stylist for commercial television, music, and editorial production.
          - paragraph [ref=e203]: Featured on the Today Show, in Vogue, Vanity Fair, New York Times, Oprah, Essence, Allure, and more.
