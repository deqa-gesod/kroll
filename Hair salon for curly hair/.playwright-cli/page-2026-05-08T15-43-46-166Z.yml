        - heading "FITZROVIA" [level=2] [ref=e35]
        - paragraph [ref=e36]: HARE & BONE is nestled within the stylish streets of FITZROVIA, W1’s newly & fashionably dubbed NOHO neighborhood. Exuding contemporary cool and rooted in British Heritage, this perfect balance allows for an unrivalled salon experience. An understated but stunning facade with beautiful HARE & BONE branding complements the vibe of the surrounding architecture while the stripped back, chic interior welcomes you warmly.
        - paragraph [ref=e37]: The highly qualified and passionate team curated by Sam Burnett for their unparalleled skills, genuine service and creative vision will assist you personally, tending to every need in order to help you feel at home, comfortable and at ease in their talented hands. Our salon is an escape from the day to day where you can relax and indulge in our laidback oasis of calm whether you opt for a fashion forward transformation or your favourite cut and colour, the HARE & BONE team will be on hand to help.
