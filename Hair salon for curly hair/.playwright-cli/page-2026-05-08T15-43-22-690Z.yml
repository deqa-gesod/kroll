  - generic [ref=e29]:
    - generic [ref=e31]:
      - generic [ref=e33]:
        - heading "WHO WE ARE…" [level=2] [ref=e34]
        - paragraph [ref=e35]: HARE & BONE is the creation of Sam Burnett, an award winning hair stylist and our Creative Director whose innovative designs have inspired international campaigns and global brands.
        - paragraph [ref=e36]: As a result, HARE & BONE is an instinctive fashion-focused, style and trend conscious salon that is set apart by our creative session experience.
        - paragraph [ref=e37]: "Sam’s mission for HARE & BONE is simple: to provide every one of our clients with an exceptional salon experience, whilst leaving with hair they absolutely love!"
        - paragraph [ref=e38]: Housed in comfortable and relaxed spaces in Fitzrovia and Esher, our salons are rooted in British heritage with a modern aesthetic.
        - paragraph [ref=e39]: So what makes us different? At Hare & Bone we are committed to progress, through the continuous education and development of our team, so they always bring cutting-edge and contemporary, yet wearable hair designs to every one of our clients. Honest and passionate about his craft, Sam has hand-picked a team of super talented stylists and colourists who are set to lead the way as the new faces of hair.
        - paragraph [ref=e40]: This passion extends also to creating a real, welcoming salon experience. We have endeavoured comprehensively to think through every element of the salon visit from the moment you walk through the door. Customer experience is at the heart of everything we do and we continually strive to exceed clients’ expectations through our creative and technical excellence in cut and colour, our attention to detail and our focus on providing each client with a truly personalised experience.
        - paragraph [ref=e41]: Inspired by a desire to create hair that works with the bone structure of the face, we spend time getting to really know each client in order to create a hairstyle that will truly complement you and your personal style. Hare & Bone’s clients span all age ranges and we are proud to boast a diverse and eclectic clientele.
        - paragraph [ref=e42]:
          - text: We welcome and encourage feedback from our clients. If you have any comments or suggestions, please don’t hesitate to tell one of the team, or contact us at
          - link "rachel@hareandbone.co.uk" [ref=e43] [cursor=pointer]:
            - /url: mailto:rachel@hareandbone.co.uk
        - paragraph [ref=e44]
