      - paragraph [ref=e38]: Please arrive to your appointment with your hair freshly washed, tangle free and dry. It is very important that you follow the prep instructions in order to receive the best possible service. If you don't follow the instructions, you will have to reschedule your appointment and forfeit your deposit. We need to see your hair in it's natural form, as curly as possible. No hats, clips, headbands, ponytails, buns, twists, braids or anything that will alter your curl pattern. Avoid using oils or any product that feels greasy to the touch. For best results, avoid straightening your curls!
