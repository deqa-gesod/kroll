  - main [ref=e20]:
    - generic [ref=e418]:
      - paragraph [ref=e419]: About — Vanessa Jackson
      - heading "The salon is what happens when she stops borrowing chairs." [level=1] [ref=e420]
      - paragraph [ref=e421]: Jackson & Coil is the salon Vanessa Jackson spent seven years in Oslo not opening. This is how she got here, and what she promises to the chair.
    - generic [ref=e424]:
      - img "Founder Vanessa Jackson, portrait against cream backdrop" [ref=e425]
      - generic [ref=e426]: Vanessa Jackson, founder
    - generic [ref=e427]:
      - generic [ref=e429]:
        - paragraph [ref=e430]: Tottenham, kitchen, Saturday morning
        - generic [ref=e431]:
          - paragraph [ref=e432]: Vanessa grew up in Tottenham, North London, the youngest daughter of Jamaican parents who ran a small Caribbean grocery on Bruce Grove. Her hair was 4a. Her grandmother did it every Saturday morning at the kitchen table — hot-comb on the gas hob, coconut oil, the smell of burned newspaper on the windowsill.
          - paragraph [ref=e433]: By the time she was sixteen she was doing the hair of every girl in her year for ten quid and a Lucozade. By eighteen she'd worked out that the thing she'd been doing for free at kitchen tables was a craft people in actual salons hadn't bothered to learn.
      - img "Close-up of hands working through Type 4 coils" [ref=e436]
      - generic [ref=e438]:
        - paragraph [ref=e439]: London, then New York, then back
        - generic [ref=e440]:
          - paragraph [ref=e441]: She trained formally at Curl Bar London under Michelle Sultan. Then she crossed to New York for a year — the original Devachan, then a season studying with Anthony Dickey at Hair Rules. Two of the rooms where the modern art of curl-cutting was being written.
          - paragraph [ref=e442]: "She came back to London with one clear opinion: that the binary the industry insisted on — Black hair in one shop, everything else in another — was a failure of craft, not of biology. Curl is curl. The technique is the same. The knowledge is the part you go and get."
      - blockquote [ref=e444]:
        - paragraph [ref=e445]: “Every curl pattern is the same job done with knowledge — and knowledge is something you go and get, not something you wait for.”
        - generic [ref=e446]: — Vanessa Jackson
      - generic [ref=e448]:
        - paragraph [ref=e449]: Why Oslo, then
        - generic [ref=e450]:
          - paragraph [ref=e451]: She moved here at 28 for a Norwegian boyfriend who didn't last but a city that did. For the next seven years she worked out of a borrowed chair at three different Oslo salons — quietly building a tightly-kept client list of women and men who'd otherwise have been on flights to London or Stockholm.
          - paragraph [ref=e452]: "What she heard in those chairs, on repeat, in three languages: that nobody in this country sees this hair properly. Not really. Not at the level the hair deserves. The choice was either get on a plane every six weeks, or accept a haircut that wasn't quite right. Most people accepted it. Some cried in the car on the way home."
          - paragraph [ref=e453]: Jackson & Coil is the answer to that, in one room, on Markveien. The whole curl spectrum — Type 2A through 4C, women and men — done by stylists who actually trained for it. No kids' table. No referral up the road. No crying in the car.
    - generic [ref=e455]:
      - generic [ref=e456]:
        - paragraph [ref=e457]: What we believe
        - heading "Three things we won't argue about." [level=2] [ref=e458]
      - generic [ref=e459]:
        - generic [ref=e460]:
          - text: "01"
          - heading "Every curl pattern is the same job, done with knowledge." [level=3] [ref=e461]
          - paragraph [ref=e462]: The technique is the same. The training is the difference. We trained for all of it — Type 2A loose waves through Type 4C tight coils — and we don't have a 'specialist' page for some of it and a regular page for the rest.
        - generic [ref=e463]:
          - text: "02"
          - heading "We cut you for your curl, not against it." [level=3] [ref=e464]
          - paragraph [ref=e465]: Dry. Curl by curl. On the natural pattern. Wet-cutting and tension-stretching hide what the hair is actually doing — and that's exactly the part we need to see.
        - generic [ref=e466]:
          - text: "03"
          - heading "You leave knowing what was done and why." [level=3] [ref=e467]
          - paragraph [ref=e468]: Every appointment ends with a short education — the cut, the products, the technique you can actually recreate at home on a Tuesday morning when the salon is closed. No mystery, no dependency.
    - generic [ref=e471]:
      - img "Salon interior with cream walls and terracotta accents" [ref=e473]
      - generic [ref=e474]:
