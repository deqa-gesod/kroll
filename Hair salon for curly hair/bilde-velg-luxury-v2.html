<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440" />
<title>Jackson & Coil / Luxe Shop, v2 (matched to W1)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter+Tight:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" />
<style>
  :root {
    --cream:        #FAF7F2;
    --cream-deep:   #F3EEE5;
    --ink:          #1A1612;
    --ink-soft:     #3A322B;
    --ink-muted:    #6F655C;
    --terracotta:   #B5532A;
    --terracotta-deep: #8E3F1F;
    --terracotta-soft: #D68A5D;
    --bookgreen:    #1F4D3F;
    --line:         #E0D8CC;

    --font-display: "Fraunces", Georgia, "Times New Roman", serif;
    --font-sans:    "Inter Tight", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono:    "JetBrains Mono", "SF Mono", Menlo, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--cream); color: var(--ink); }
  body {
    font-family: var(--font-sans);
    font-feature-settings: "ss01", "ss02";
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    min-width: 1440px;
  }
  img { display: block; max-width: 100%; }

  ::selection { background: var(--terracotta); color: var(--cream); }

  /* Reusable display class */
  .fd {
    font-family: var(--font-display);
    font-optical-sizing: auto;
    font-variation-settings: "opsz" 144;
    letter-spacing: -0.025em;
    line-height: 0.95;
  }
  .eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--terracotta-deep);
  }
  .eyebrow.muted { color: var(--ink-muted); }
  .mono {
    font-family: var(--font-mono);
  }
  .hr { height: 1px; background: var(--line); border: 0; margin: 0; }
  button { font-family: inherit; }

  /* --------- harness header ---------- */
  .harness-header {
    position: sticky; top: 0; z-index: 50;
    background: var(--cream);
    border-bottom: 1px solid var(--line);
  }
  .harness-inner {
    max-width: 1440px;
    margin: 0 auto;
    padding: 14px 32px 0;
  }
  .harness-top {
    display: flex; align-items: center; justify-content: space-between;
    padding-bottom: 10px;
  }
  .harness-brand {
    font-family: var(--font-display);
    font-size: 18px;
    letter-spacing: -0.01em;
  }
  .harness-brand small {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-left: 12px;
  }
  .harness-actions {
    display: flex; gap: 8px;
  }
  .harness-btn {
    background: var(--cream);
    color: var(--ink);
    border: 1px solid var(--line);
    padding: 8px 14px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
  }
  .harness-btn:hover { border-color: var(--ink); }
  .harness-btn.primary {
    background: var(--ink); color: var(--cream); border-color: var(--ink);
  }
  .harness-btn.primary:hover { background: var(--terracotta); border-color: var(--terracotta); }

  .harness-tabs {
    display: flex; gap: 0;
    overflow-x: auto;
  }
  .harness-tab {
    flex: 0 0 auto;
    background: transparent;
    border: 0;
    padding: 14px 18px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
  }
  .harness-tab[aria-selected="true"] {
    color: var(--ink);
    border-bottom-color: var(--terracotta);
  }
  .harness-tab small {
    display: block;
    font-family: var(--font-display);
    font-size: 16px;
    letter-spacing: -0.01em;
    text-transform: none;
    color: inherit;
    margin-top: 4px;
  }

  /* --------- shared canvas per design ---------- */
  .design {
    display: none;
    background: var(--cream);
  }
  .design[data-active="true"] { display: block; }
  .design .frame {
    max-width: 1440px;
    margin: 0 auto;
    padding: 0 32px 80px;
  }
  .design-header {
    padding: 36px 32px 28px;
    max-width: 1440px;
    margin: 0 auto;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: flex-end; justify-content: space-between; gap: 32px;
  }
  .design-header h2 {
    margin: 8px 0 0;
    font-family: var(--font-display);
    font-optical-sizing: auto;
    font-variation-settings: "opsz" 144;
    letter-spacing: -0.025em;
    line-height: 0.95;
    font-size: 56px;
    color: var(--ink);
    font-weight: 400;
  }
  .design-header .lede {
    font-size: 15px;
    line-height: 1.55;
    color: var(--ink-soft);
    max-width: 440px;
  }

  /* --------- shared toolbar (filters / sort) ---------- */
  .toolbar {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 32px;
    padding: 28px 0;
    border-bottom: 1px solid var(--line);
    align-items: end;
  }
  .toolbar-left { display: flex; flex-wrap: wrap; gap: 28px; align-items: flex-end; }
  .filter-group {
    display: flex; flex-direction: column; gap: 8px;
  }
  .filter-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    background: var(--cream);
    color: var(--ink-soft);
    border: 1px solid var(--line);
    padding: 6px 11px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
  }
  .chip:hover { border-color: var(--ink); }
  .chip[aria-pressed="true"] {
    background: var(--ink);
    color: var(--cream);
    border-color: var(--ink);
  }
  .price-row {
    display: flex; gap: 10px; align-items: center;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--ink-soft);
  }
  .price-row input[type="range"] {
    accent-color: var(--terracotta);
    width: 160px;
  }
  .price-row .price-val { color: var(--ink); min-width: 64px; }

  .sort-select {
    background: var(--cream);
    border: 1px solid var(--line);
    padding: 8px 28px 8px 12px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink);
    appearance: none;
    background-image: linear-gradient(45deg, transparent 50%, var(--ink-soft) 50%), linear-gradient(135deg, var(--ink-soft) 50%, transparent 50%);
    background-position: calc(100% - 14px) 50%, calc(100% - 9px) 50%;
    background-size: 5px 5px;
    background-repeat: no-repeat;
    cursor: pointer;
  }
  .toolbar-right {
    display: flex; flex-direction: column; align-items: flex-end; gap: 8px;
  }
  .count-strip {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }

  /* --------- pagination ---------- */
  .pagination {
    display: flex; justify-content: center; gap: 4px;
    margin-top: 48px;
    padding-top: 32px;
    border-top: 1px solid var(--line);
  }
  .page-btn {
    background: transparent;
    border: 1px solid var(--line);
    padding: 10px 16px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-soft);
    cursor: pointer;
    min-width: 44px;
  }
  .page-btn:hover { border-color: var(--ink); color: var(--ink); }
  .page-btn[aria-current="page"] {
    background: var(--ink); color: var(--cream); border-color: var(--ink);
  }
  .page-btn[disabled] {
    color: var(--ink-muted);
    cursor: not-allowed;
    opacity: 0.5;
  }

  /* --------- product card primitives ---------- */
  .pc-image {
    position: relative;
    background: var(--cream-deep);
    overflow: hidden;
  }
  .pc-image img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.7s ease; }
  .pc-image:hover img { transform: scale(1.04); }
  .pc-image .pick-tag {
    position: absolute; top: 12px; left: 12px;
    background: var(--terracotta); color: var(--cream);
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.2em; text-transform: uppercase;
    padding: 4px 8px;
  }
  .pc-image .stock-tag {
    position: absolute; top: 12px; right: 12px;
    background: var(--cream); color: var(--terracotta);
    border: 1px solid var(--terracotta);
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.2em; text-transform: uppercase;
    padding: 4px 8px;
  }
  .pc-image .stock-tag.out {
    background: var(--ink); color: var(--cream); border-color: var(--ink);
  }
  .pc-brand {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }
  .pc-name {
    font-family: var(--font-display);
    font-optical-sizing: auto;
    font-variation-settings: "opsz" 144;
    letter-spacing: -0.015em;
    line-height: 1.1;
    color: var(--ink);
    font-weight: 400;
  }
  .pc-desc {
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.5;
  }
  .pc-price {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--ink);
  }
  .pc-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .pc-tag {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-muted);
    border: 1px solid var(--line);
    padding: 2px 6px;
  }
  .add-btn {
    background: var(--ink);
    color: var(--cream);
    border: 1px solid var(--ink);
    padding: 8px 14px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
  }
  .add-btn:hover { background: var(--terracotta); border-color: var(--terracotta); }
  .add-btn.ghost { background: transparent; color: var(--ink); }
  .add-btn.ghost:hover { background: var(--ink); color: var(--cream); }

  .empty-msg {
    padding: 64px 0;
    text-align: center;
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }

  /* =========================================================
     Design 1: Editorial 4-col grid
     ========================================================= */
  .d1 .products {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    column-gap: 24px;
    row-gap: 56px;
    padding-top: 48px;
  }
  .d1 .pc { display: flex; flex-direction: column; }
  .d1 .pc-image { aspect-ratio: 4/5; }
  .d1 .pc-meta { margin-top: 18px; display: flex; flex-direction: column; gap: 6px; }
  .d1 .pc-brand { margin-bottom: 2px; }
  .d1 .pc-name { font-size: 22px; }
  .d1 .pc-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; gap: 10px; }

  /* =========================================================
     Design 2: Magazine asymmetric (1 big + 2 medium, then 3-col)
     ========================================================= */
  .d2 .hero-row {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr;
    gap: 24px;
    padding-top: 48px;
  }
  .d2 .hero-row .pc-image { aspect-ratio: 4/5; }
  .d2 .hero-row .pc.big .pc-image { aspect-ratio: 4/5; }
  .d2 .hero-row .pc.big .pc-name { font-size: 36px; }
  .d2 .hero-row .pc { display: flex; flex-direction: column; }
  .d2 .hero-row .pc-meta { margin-top: 18px; display: flex; flex-direction: column; gap: 6px; }
  .d2 .hero-row .pc-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; gap: 10px; }
  .d2 .products {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    column-gap: 32px;
    row-gap: 56px;
    padding-top: 56px;
  }
  .d2 .products .pc-image { aspect-ratio: 1/1; }
  .d2 .products .pc-meta { margin-top: 16px; display: flex; flex-direction: column; gap: 6px; }
  .d2 .products .pc-name { font-size: 24px; }
  .d2 .products .pc-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; gap: 10px; }
  .d2 .section-rule {
    margin: 64px 0 0;
    display: flex; align-items: baseline; justify-content: space-between; gap: 24px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--line);
  }
  .d2 .section-rule h3 {
    margin: 0;
    font-family: var(--font-display);
    font-size: 32px;
    letter-spacing: -0.02em;
    font-weight: 400;
  }

  /* =========================================================
     Design 3: Gallery 2-col big images
     ========================================================= */
  .d3 .products {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    column-gap: 48px;
    row-gap: 88px;
    padding-top: 56px;
  }
  .d3 .pc { display: grid; grid-template-columns: 1fr; gap: 0; }
  .d3 .pc-image { aspect-ratio: 4/5; }
  .d3 .pc-meta {
    margin-top: 24px;
    display: grid;
    grid-template-columns: 1fr auto;
    column-gap: 24px;
    row-gap: 6px;
    align-items: end;
  }
  .d3 .pc-brand { grid-column: 1 / 2; }
  .d3 .pc-name {
    font-size: 34px;
    grid-column: 1 / 2;
  }
  .d3 .pc-price {
    grid-column: 2 / 3;
    grid-row: 1 / 3;
    align-self: end;
    font-size: 18px;
  }
  .d3 .pc-desc { grid-column: 1 / -1; max-width: 520px; }
  .d3 .pc-foot { grid-column: 1 / -1; display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-top: 14px; }

  /* =========================================================
     Design 4: List-view editorial (horizontal rows)
     ========================================================= */
  .d4 .products {
    display: flex; flex-direction: column;
    gap: 0;
    padding-top: 24px;
  }
  .d4 .pc {
    display: grid;
    grid-template-columns: 340px 1fr 220px;
    gap: 48px;
    padding: 36px 0;
    border-bottom: 1px solid var(--line);
    align-items: start;
  }
  .d4 .pc-image { aspect-ratio: 1/1; }
  .d4 .pc-mid { display: flex; flex-direction: column; gap: 10px; padding-top: 8px; }
  .d4 .pc-name { font-size: 30px; }
  .d4 .pc-desc { max-width: 540px; }
  .d4 .pc-right {
    display: flex; flex-direction: column; align-items: flex-end; gap: 14px;
    padding-top: 8px;
  }
  .d4 .pc-right .pc-price { font-size: 16px; }
  .d4 .pc-tags-strip {
    display: flex; gap: 16px; margin-top: 4px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }
  .d4 .pc-tags-strip span b { font-weight: 500; color: var(--ink-soft); }

  /* =========================================================
     Design 5: Tabbed by category (3-col grid per tab)
     ========================================================= */
  .d5 .cat-tabs {
    display: flex;
    gap: 0;
    padding-top: 32px;
    border-bottom: 1px solid var(--line);
    overflow-x: auto;
  }
  .d5 .cat-tab {
    background: transparent;
    border: 0;
    padding: 8px 0 20px;
    margin-right: 40px;
    cursor: pointer;
    text-align: left;
    flex: 0 0 auto;
  }
  .d5 .cat-tab .num {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 6px;
    display: block;
  }
  .d5 .cat-tab .name {
    font-family: var(--font-display);
    font-size: 30px;
    letter-spacing: -0.02em;
    color: var(--ink-muted);
    line-height: 1;
  }
  .d5 .cat-tab[aria-selected="true"] .name { color: var(--ink); }
  .d5 .cat-tab[aria-selected="true"] {
    border-bottom: 2px solid var(--terracotta);
    margin-bottom: -1px;
  }
  .d5 .products {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    column-gap: 32px;
    row-gap: 56px;
    padding-top: 48px;
  }
  .d5 .pc { display: flex; flex-direction: column; }
  .d5 .pc-image { aspect-ratio: 1/1; }
  .d5 .pc-meta { margin-top: 18px; display: flex; flex-direction: column; gap: 6px; }
  .d5 .pc-name { font-size: 26px; }
  .d5 .pc-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; gap: 10px; }

  /* =========================================================
     Design 6: Curated stories (themed blocks)
     ========================================================= */
  .d6 .story {
    padding-top: 56px;
  }
  .d6 .story + .story { padding-top: 80px; }
  .d6 .story-head {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 48px;
    align-items: end;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--line);
  }
  .d6 .story-head h3 {
    margin: 8px 0 0;
    font-family: var(--font-display);
    font-size: 48px;
    letter-spacing: -0.025em;
    line-height: 0.98;
    font-weight: 400;
  }
  .d6 .story-head p {
    color: var(--ink-soft); font-size: 14px; line-height: 1.6; max-width: 480px;
    margin: 0;
  }
  .d6 .story-head .num {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--terracotta-deep);
  }
  .d6 .story-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px;
    padding-top: 32px;
  }
  .d6 .pc-image { aspect-ratio: 4/5; }
  .d6 .pc-meta { margin-top: 16px; display: flex; flex-direction: column; gap: 6px; }
  .d6 .pc-name { font-size: 20px; }
  .d6 .pc-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; gap: 8px; }

  /* =========================================================
     Design 7: Hero bestseller + dense grid
     ========================================================= */
  .d7 .hero-card {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 48px;
    padding: 48px 0;
    border-bottom: 1px solid var(--line);
    align-items: center;
  }
  .d7 .hero-card .pc-image { aspect-ratio: 4/5; }
  .d7 .hero-card .hero-meta {
    display: flex; flex-direction: column; gap: 20px;
  }
  .d7 .hero-card .hero-meta .pc-name { font-size: 56px; line-height: 0.98; }
  .d7 .hero-card .hero-meta .pc-desc { font-size: 16px; max-width: 460px; }
  .d7 .hero-card .hero-meta .pc-foot {
    display: flex; align-items: center; gap: 20px; margin-top: 8px;
  }
  .d7 .hero-card .hero-meta .pc-price { font-size: 18px; }
  .d7 .hero-card .hero-meta .add-btn { padding: 14px 24px; }
  .d7 .hero-card .ribbon {
    display: inline-flex; align-self: flex-start;
    background: var(--ink); color: var(--cream);
    padding: 6px 12px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }
  .d7 .products {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    column-gap: 24px;
    row-gap: 48px;
    padding-top: 48px;
  }
  .d7 .pc-image { aspect-ratio: 1/1; }
  .d7 .pc-meta { margin-top: 16px; display: flex; flex-direction: column; gap: 5px; }
  .d7 .pc-name { font-size: 20px; }
  .d7 .pc-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; gap: 8px; }

  /* =========================================================
     Design 8: Sidebar filter + 3-col luxe grid
     ========================================================= */
  .d8 .layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 56px;
    padding-top: 48px;
  }
  .d8 aside {
    position: sticky;
    top: 140px;
    align-self: flex-start;
    border-right: 1px solid var(--line);
    padding-right: 32px;
  }
  .d8 aside .filter-group {
    padding-bottom: 24px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 24px;
  }
  .d8 aside .filter-group:last-child {
    border-bottom: 0;
  }
  .d8 aside h4 {
    margin: 0 0 14px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ink);
  }
  .d8 aside .chips { gap: 6px; }
  .d8 .products {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    column-gap: 32px;
    row-gap: 64px;
  }

const CATEGORIES = [
  { key: "shampoo", label: "Shampoo" },
  { key: "conditioner", label: "Conditioner" },

  { key: "deep-treatment", label: "Deep treatment" },

  { key: "low", label: "Low" },
  { key: "medium", label: "Medium" },
  { key: "high", label: "High" }
];
const SORTS = [
  { key: "featured", label: "Anbefalt" },
  { key: "price-asc", label: "Lavest pris" },
  { key: "price-desc", label: "Høyest pris" },
  { key: "name-asc", label: "A til Å" },
  { key: "bestseller", label: "Mest solgt" }
];

const PAGE_SIZE = 12;

function filterAndSort(state) {
  let out = PRODUCTS.filter(p => {
    if (state.categories.size && !state.categories.has(p.category)) return false;
    if (state.hairTypes.size && !p.hairTypes.some(t => state.hairTypes.has(t))) return false;
    if (state.porosity.size && !p.porosity.some(t => state.porosity.has(t))) return false;
    if (p.price < state.priceMin || p.price > state.priceMax) return false;
    return true;
  });
  switch (state.sort) {
    case "price-asc":  out.sort((a,b) => a.price - b.price); break;
    case "price-desc": out.sort((a,b) => b.price - a.price); break;
    case "name-asc":   out.sort((a,b) => a.name.localeCompare(b.name, "nb")); break;
    case "bestseller": out.sort((a,b) => (b.bestseller?1:0) - (a.bestseller?1:0) || b.reviewCount - a.reviewCount); break;
    default: /* featured */ out.sort((a,b) => (b.bestseller?1:0) - (a.bestseller?1:0) || b.rating - a.rating);
  }
  return out;
}

function paginate(rows, page) {
  const total = rows.length;
  const pageCount = Math.max(1, Math.ceil(total / PAGE_SIZE));
  const safePage = Math.min(Math.max(1, page), pageCount);
  const start = (safePage - 1) * PAGE_SIZE;
  return {
    items: rows.slice(start, start + PAGE_SIZE),
    total, pageCount, page: safePage
  };
}

  let parts = "";
  if (p.stylistPick) parts += '<span class="pick-tag">Stylist favoritt</span>';
  if (p.stock === "low_stock") parts += '<span class="stock-tag">Bare noen få</span>';
  if (p.stock === "out_of_stock") parts += '<span class="stock-tag out">Utsolgt</span>';
  return parts;
}

function imageBlockHTML(p) {
  return `<div class="pc-image"><img src="${imgSrc(p)}" alt="${escAttr(p.brand + " " + p.name)}" loading="lazy" />${badgeHTML(p)}</div>`;
}

function tagsHTML(p, max) {
  const list = max ? p.hairTypes.slice(0, max) : p.hairTypes;
  return `<div class="pc-tags">${list.map(t => `<span class="pc-tag">${t}</span>`).join("")}</div>`;

/* ------------------------------------------------------------
   Toolbar (filter / sort / count)
   ------------------------------------------------------------ */
function renderToolbar(designId, state, total) {
  const cats = CATEGORIES.map(c =>
    `<button type="button" class="chip" data-kind="category" data-value="${c.key}" aria-pressed="${state.categories.has(c.key)}">${c.label}</button>`
  ).join("");
  const types = HAIR_TYPES.map(t =>
    `<button type="button" class="chip" data-kind="hairType" data-value="${t}" aria-pressed="${state.hairTypes.has(t)}">${t}</button>`
  ).join("");
  const pors = POROSITY.map(p =>
    `<button type="button" class="chip" data-kind="porosity" data-value="${p.key}" aria-pressed="${state.porosity.has(p.key)}">${p.label}</button>`
  ).join("");
  const sortOptions = SORTS.map(s => `<option value="${s.key}" ${s.key === state.sort ? "selected" : ""}>${s.label}</option>`).join("");

  return `
    <div class="toolbar">
      <div class="toolbar-left">
        <div class="filter-group">
          <span class="filter-label">Kategori</span>
          <div class="chips">${cats}</div>
        </div>
        <div class="filter-group">
          <span class="filter-label">Hårtype</span>
          <div class="chips">${types}</div>
        </div>
        <div class="filter-group">
          <span class="filter-label">Porositet</span>
          <div class="chips">${pors}</div>
        </div>
        <div class="filter-group">
          <span class="filter-label">Pris</span>
          <div class="price-row">
            <span class="price-val" data-role="price-min">${state.priceMin} kr</span>
            <input type="range" min="0" max="1000" step="10" value="${state.priceMin}" data-kind="priceMin" />
            <input type="range" min="0" max="1000" step="10" value="${state.priceMax}" data-kind="priceMax" />
            <span class="price-val" data-role="price-max">${state.priceMax} kr</span>
          </div>
        </div>
      </div>
      <div class="toolbar-right">
        <span class="count-strip"><span data-role="count">${total}</span> produkter</span>
        <select class="sort-select" data-kind="sort">
          ${sortOptions}
        </select>
      </div>
    </div>
  `;
}

/* Pagination */
function renderPagination(state, pageCount) {
  if (pageCount <= 1) return "";
  let pages = "";
  for (let i = 1; i <= pageCount; i++) {
    pages += `<button class="page-btn" data-page="${i}" aria-current="${i === state.page ? "page" : "false"}">${i}</button>`;
  }
  return `
    <div class="pagination">
      <button class="page-btn" data-page="prev" ${state.page === 1 ? "disabled" : ""}>Forrige</button>
      ${pages}
      <button class="page-btn" data-page="next" ${state.page === pageCount ? "disabled" : ""}>Neste</button>
    </div>
  `;
}

   ------------------------------------------------------------ */
function renderDesignBody(design) {
  const state = STATES[design.id];
  if (design.id === 5) {
    return renderDesign5(design, state);
  }
  if (design.id === 6) {
    return renderDesign6(design, state);
  }
  if (design.id === 7) {
    return renderDesign7(design, state);
  }
  if (design.id === 8) {
    return renderDesign8(design, state);
  }
  return renderStandard(design, state);
}

function renderStandard(design, state) {
  const filtered = filterAndSort(state);
  const { items, total, pageCount, page } = paginate(filtered, state.page);
  state.page = page;

  let cards = "";
  if (design.id === 1) cards = items.map(card_D1).join("");
  else if (design.id === 2) {
    const head = items.slice(0, 3);
    const rest = items.slice(3);
    const headHTML = head.length ? `
      <div class="hero-row">
        ${head[0] ? card_D2_big(head[0]) : ""}
        ${head[1] ? card_D2_small(head[1]) : ""}
        ${head[2] ? card_D2_small(head[2]) : ""}
      </div>` : "";
    const subhead = rest.length ? `
      <div class="section-rule">
        <h3>Resten av arkivet</h3>
        <span class="eyebrow muted">${rest.length} produkter</span>
      </div>` : "";
    cards = headHTML + subhead + `<div class="products">${rest.map(card_D2_small).join("")}</div>`;
  }
  else if (design.id === 3) cards = items.map(card_D3).join("");
  else if (design.id === 4) cards = items.map(card_D4).join("");

  const productsWrap = (design.id === 2)
    ? cards
    : `<div class="products">${cards}</div>`;

  const empty = total === 0 ? `<p class="empty-msg">Ingen produkter matcher filtrene ennå. Fjern en chip eller to.</p>` : "";

  return `
    <div class="design-header">
      <div>
        <span class="eyebrow">Design ${design.num} / ${design.key}</span>
        <h2>${design.name}</h2>
      </div>
      <p class="lede">${design.lede}</p>
    </div>
    <div class="frame d${design.id}">
      ${renderToolbar(design.id, state, total)}
      ${productsWrap}
      ${empty}
      ${renderPagination(state, pageCount)}
    </div>
  `;
}

      </div>
      <div class="frame d${design.id}">
        ${renderToolbar(design.id, state, 0)}
        <p class="empty-msg">Ingen produkter matcher filtrene ennå.</p>
      </div>`;
  }
  const hero = filtered[0];
  const rest = filtered.slice(1);
  const { items, total, pageCount, page } = paginate(rest, state.page);
  state.page = page;

  return `
    <div class="design-header">
      <div>
        <span class="eyebrow">Design ${design.num} / ${design.key}</span>
        <h2>${design.name}</h2>
      </div>
      <p class="lede">${design.lede}</p>
    </div>
    <div class="frame d${design.id}">
      ${renderToolbar(design.id, state, filtered.length)}
      <article class="hero-card js-card" data-slug="${hero.slug}">
        ${imageBlockHTML(hero)}
        <div class="hero-meta">
          <span class="ribbon">Månedens bestselger</span>
          <span class="pc-brand">${hero.brand}</span>
          <h3 class="pc-name">${hero.name}</h3>
          <p class="pc-desc">${hero.longDescription}</p>
          <div class="pc-foot">
            <span class="pc-price">${formatNok(hero.price)}</span>
            ${hero.stock === "out_of_stock"
              ? '<button class="add-btn" disabled style="opacity:.55;cursor:not-allowed">Venteliste</button>'
              : '<button class="add-btn js-add">Legg i kurv</button>'}
            <button class="add-btn ghost js-detail">Les mer</button>
          </div>
        </div>
      </article>
      <div class="products">${items.map(card_D7).join("")}</div>
      ${renderPagination(state, pageCount)}
    </div>
  `;
}

function renderDesign8(design, state) {
  const filtered = filterAndSort(state);
  const { items, total, pageCount, page } = paginate(filtered, state.page);
  state.page = page;

  // Custom sidebar toolbar inside aside; main toolbar only has sort + count.
  const cats = CATEGORIES.map(c =>
    `<button type="button" class="chip" data-kind="category" data-value="${c.key}" aria-pressed="${state.categories.has(c.key)}">${c.label}</button>`
  ).join("");
  const types = HAIR_TYPES.map(t =>
    `<button type="button" class="chip" data-kind="hairType" data-value="${t}" aria-pressed="${state.hairTypes.has(t)}">${t}</button>`
  ).join("");
  const pors = POROSITY.map(p =>
    `<button type="button" class="chip" data-kind="porosity" data-value="${p.key}" aria-pressed="${state.porosity.has(p.key)}">${p.label}</button>`
  ).join("");
  const sortOptions = SORTS.map(s => `<option value="${s.key}" ${s.key === state.sort ? "selected" : ""}>${s.label}</option>`).join("");

  return `
    <div class="design-header">
      <div>
        <span class="eyebrow">Design ${design.num} / ${design.key}</span>
        <h2>${design.name}</h2>
      </div>
      <p class="lede">${design.lede}</p>
    </div>
    <div class="frame d${design.id}">
      <div class="layout">
        <aside>
          <div class="filter-group">
            <h4>Kategori</h4>
            <div class="chips">${cats}</div>
          </div>
          <div class="filter-group">
            <h4>Hårtype</h4>
            <div class="chips">${types}</div>
          </div>
          <div class="filter-group">
            <h4>Porositet</h4>
            <div class="chips">${pors}</div>
          </div>
          <div class="filter-group">
            <h4>Pris</h4>
            <div class="price-row">
              <span class="price-val" data-role="price-min">${state.priceMin} kr</span>
              <input type="range" min="0" max="1000" step="10" value="${state.priceMin}" data-kind="priceMin" />
            </div>
            <div class="price-row" style="margin-top:8px">
              <input type="range" min="0" max="1000" step="10" value="${state.priceMax}" data-kind="priceMax" />
              <span class="price-val" data-role="price-max">${state.priceMax} kr</span>
            </div>
          </div>
        </aside>
        <div>
          <div class="main-toolbar">
            <span class="count-strip"><span data-role="count">${total}</span> produkter</span>
            <select class="sort-select" data-kind="sort">${sortOptions}</select>
          </div>
          <div class="products" style="padding-top:40px">
            ${items.map(card_D8).join("")}
          </div>
          ${total === 0 ? `<p class="empty-msg">Ingen produkter matcher filtrene ennå. Fjern en chip eller to.</p>` : ""}
          ${renderPagination(state, pageCount)}
        </div>
      </div>
    </div>
  `;
}

/* ------------------------------------------------------------
   Render & event wiring
   ------------------------------------------------------------ */
let activeDesignId = 1;
let selectedDesignId = null;

function bootstrapTabs() {
  const tabs = document.getElementById("design-tabs");
  tabs.innerHTML = DESIGNS.map(d => `
    <button class="harness-tab" data-design="${d.id}" role="tab"
            aria-selected="${d.id === activeDesignId}">
      <span>${d.num} / ${d.key}</span>
      <small>${d.name}</small>
    </button>
  `).join("");
  tabs.addEventListener("click", (ev) => {
    const t = ev.target.closest(".harness-tab");
    if (!t) return;
    const id = Number(t.dataset.design);
    if (id === activeDesignId) return;
    activeDesignId = id;
    [...tabs.children].forEach(c => c.setAttribute("aria-selected", String(Number(c.dataset.design) === id)));
    showDesign(id);
  });
}

function bootstrapDesigns() {
  const root = document.getElementById("designs");
  root.innerHTML = DESIGNS.map(d => `
    <section class="design" data-design="${d.id}" data-active="${d.id === activeDesignId}">
      <div class="design-body"></div>
    </section>
  `).join("");
  DESIGNS.forEach(d => rerenderDesign(d.id));
}

function showDesign(id) {
  document.querySelectorAll(".design").forEach(s => {
    s.setAttribute("data-active", String(Number(s.dataset.design) === id));
  });
}

function rerenderDesign(id) {
  const design = DESIGNS.find(d => d.id === id);
  const root = document.querySelector(`.design[data-design="${id}"] .design-body`);
  root.innerHTML = renderDesignBody(design);
  wireDesign(id);
}

function wireDesign(id) {
  const state = STATES[id];
  const root = document.querySelector(`.design[data-design="${id}"]`);
  if (!root) return;

  // Chip clicks (categories, hair types, porosity)
  root.querySelectorAll(".chip").forEach(el => {
    el.addEventListener("click", () => {
      const kind = el.dataset.kind;
      const value = el.dataset.value;
      if (kind === "category") {
        if (state.categories.has(value)) state.categories.delete(value); else state.categories.add(value);
      } else if (kind === "hairType") {
        if (state.hairTypes.has(value)) state.hairTypes.delete(value); else state.hairTypes.add(value);
      } else if (kind === "porosity") {
        if (state.porosity.has(value)) state.porosity.delete(value); else state.porosity.add(value);
      }
      state.page = 1;
      rerenderDesign(id);
    });
  });

  // Price range
  root.querySelectorAll('input[type="range"]').forEach(input => {
    input.addEventListener("input", (e) => {
      const val = Number(e.target.value);
      if (e.target.dataset.kind === "priceMin") state.priceMin = Math.min(val, state.priceMax);
      if (e.target.dataset.kind === "priceMax") state.priceMax = Math.max(val, state.priceMin);
      state.page = 1;
      rerenderDesign(id);
    });
  });

  // Sort
  root.querySelectorAll('select[data-kind="sort"]').forEach(sel => {
    sel.addEventListener("change", () => {
      state.sort = sel.value;
      state.page = 1;
      rerenderDesign(id);
    });
  });

  // Pagination
  root.querySelectorAll(".page-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      if (btn.hasAttribute("disabled")) return;
      const v = btn.dataset.page;
      if (v === "prev") state.page = Math.max(1, state.page - 1);
      else if (v === "next") state.page = state.page + 1;
      else state.page = Number(v);
      rerenderDesign(id);
      // Scroll to top of design
      const top = document.querySelector(`.design[data-design="${id}"]`).getBoundingClientRect().top + window.scrollY - 100;
      window.scrollTo({ top, behavior: "smooth" });
    });
  });

  // Category tabs (design 5 only)
  root.querySelectorAll(".cat-tab").forEach(tab => {
    tab.addEventListener("click", () => {
      const v = tab.dataset.cat || null;
      state.activeCategory = v;
      state.page = 1;
      rerenderDesign(id);
    });
  });

  // Card clicks -> modal
  root.querySelectorAll(".js-card").forEach(card => {
    card.addEventListener("click", (ev) => {
      // Don't double-trigger when an inner button is clicked
      if (ev.target.closest(".js-add")) return;
      openModal(card.dataset.slug);
    });
  });

  // Add to bag (mock)
  root.querySelectorAll(".js-add").forEach(btn => {
    btn.addEventListener("click", (ev) => {
      ev.stopPropagation();
      toast("Lagt i kurv");
    });
  });

  root.querySelectorAll(".js-detail").forEach(btn => {
    btn.addEventListener("click", (ev) => {
      ev.stopPropagation();
      const card = btn.closest(".js-card");
      if (card) openModal(card.dataset.slug);
    });
  });
}

/* ------------------------------------------------------------
   Modal
   ------------------------------------------------------------ */
function openModal(slug) {
  const p = PRODUCTS.find(x => x.slug === slug);
  if (!p) return;
  document.getElementById("m-img").src = imgSrc(p);
  document.getElementById("m-img").alt = p.brand + " " + p.name;
  document.getElementById("m-brand").textContent = p.brand;
  document.getElementById("m-name").textContent = p.name;
  document.getElementById("m-lede").textContent = p.description;
  document.getElementById("m-long").textContent = p.longDescription;
  document.getElementById("m-price").textContent = formatNok(p.price);
  document.getElementById("m-meta").innerHTML = `
    <span><b>Kategori</b></span><span>${p.category}</span>
    <span><b>Hårtype</b></span><span>${p.hairTypes.join(", ")}</span>
    <span><b>Porositet</b></span><span>${p.porosity.join(", ")}</span>
    <span><b>Vurdering</b></span><span>${p.rating.toFixed(1)} / ${p.reviewCount} omtaler</span>
    ${p.stylistPick ? `<span><b>Stylist</b></span><span style="color:var(--terracotta-deep)">${p.stylistPick}</span>` : ""}
  `;
  const add = document.getElementById("m-add");
  if (p.stock === "out_of_stock") {
    add.textContent = "Sett på venteliste";
    add.disabled = true;
    add.style.opacity = "0.55";
    add.style.cursor = "not-allowed";
  } else {
    add.textContent = "Legg i kurv";
    add.disabled = false;
    add.style.opacity = "1";
    add.style.cursor = "pointer";
  }
  document.getElementById("modal").setAttribute("data-open", "true");
}
function closeModal() {
  document.getElementById("modal").setAttribute("data-open", "false");
}
document.getElementById("modal-close").addEventListener("click", closeModal);
document.getElementById("modal").addEventListener("click", (e) => {
  if (e.target.id === "modal") closeModal();
});
document.getElementById("m-add").addEventListener("click", () => {
  if (!document.getElementById("m-add").disabled) {
    toast("Lagt i kurv");
    closeModal();
  }
});
window.addEventListener("keydown", (e) => { if (e.key === "Escape") closeModal(); });

/* ------------------------------------------------------------
   Selection + copy
   ------------------------------------------------------------ */
document.getElementById("select-current").addEventListener("click", () => {
  selectedDesignId = activeDesignId;
  const d = DESIGNS.find(x => x.id === activeDesignId);
  document.getElementById("selected-name").textContent = `Design ${d.num} / ${d.name}`;
  toast("Design valgt");
});
document.getElementById("copy-btn").addEventListener("click", async () => {
  const d = selectedDesignId
    ? DESIGNS.find(x => x.id === selectedDesignId)
    : DESIGNS.find(x => x.id === activeDesignId);
  const payload = {
    selectedDesign: {
      id: d.id,
      num: d.num,
      key: d.key,
      name: d.name
    },
    timestamp: new Date().toISOString()
  };
  const text = JSON.stringify(payload, null, 2);
  try {
    await navigator.clipboard.writeText(text);
    toast("Kopiert");
  } catch {
    // Fallback
    const ta = document.createElement("textarea");
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand("copy"); ta.remove();
    toast("Kopiert");
  }
});

let toastTimer;
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.setAttribute("data-show", "true");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.setAttribute("data-show", "false"), 1600);
}

/* ------------------------------------------------------------
   Boot
   ------------------------------------------------------------ */
bootstrapTabs();
bootstrapDesigns();
showDesign(activeDesignId);
</script>
