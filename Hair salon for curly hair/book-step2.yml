              - paragraph [ref=f1e20]:
                - strong [ref=f1e23]: HELLO,
              - paragraph [ref=f1e24]: Please have a read through the variety of treatments to ensure you have chosen the right one for you.
              - paragraph [ref=f1e25]: Before you book your appointment, please visit our policy page to see our terms and conditions. We also have a FAQ page that answers common queries.
              - paragraph [ref=f1e26]:
                - strong [ref=f1e29]:
                  - generic [ref=f1e30]: "HOW TO ARRIVE:"
              - list [ref=f1e31]:
                - listitem [ref=f1e32]:
                  - emphasis [ref=f1e34]: Wash and detangle your hair one to two days before your appointment. You can apply product if this makes you feel more comfortable but we'd prefer if it was minimal.
                - listitem [ref=f1e35]:
                  - emphasis [ref=f1e37]: Avoid slicking your hair into a bun, twists or plaits to avoid manipulation
                - listitem [ref=f1e38]:
                  - emphasis [ref=f1e40]: Do not brush out the curls once it is dry, (we want to see how your curls naturally sit)
              - paragraph [ref=f1e41]:
                - generic [ref=f1e42]:
                  - text: Please book the correct service for your hair type as we have carefully dedicated the required time for you. If you are unsure which hair type you are between wavy, curly and coily send us a message on our Instagram
                  - emphasis [ref=f1e43]: (@TheCurlBarLondon)
                  - text: or eMail us at
                  - emphasis [ref=f1e44]: (Info@thecurlbarlondon.com)
              - paragraph [ref=f1e45]:
                - generic [ref=f1e46]:
                  - strong [ref=f1e47]: CONSULTATION/ UNSURE WHAT TO BOOK? -
                  - text: If you are unsure of what to book, please send us photos of your hair to our email or Instagram DM and we will advise you there.
              - paragraph [ref=f1e48]:
                - generic [ref=f1e49]:
                  - strong [ref=f1e50]: HIJAB/ PRIVACY ROOM -
                  - text: For all of our beautiful Queens who wear a hijab, we have a private room so you will not be seen by anyone other than your stylist during your appointment unless there is another client who is also wearing a hijab with another stylist.
              - paragraph [ref=f1e51]:
                - generic [ref=f1e52]:
                  - strong [ref=f1e53]: APPOINTMENT SLOTS -
                  - text: Our slots are released on the 1st of every month at 8pm. We post cancellations on our Instagram stories as soon as they occur.
              - paragraph [ref=f1e54]: We look forward to meeting you and pampering your curls.
