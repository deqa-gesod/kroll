<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<title>Jackson & Coil shop bilde-velger</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --cream: #f5ede0;
    --cream-soft: #fbf6ec;
    --ink: #1f1f1f;
    --muted: #6b6b6b;
    --terracotta: #c87456;
    --line: #e3dccd;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--cream-soft); color: var(--ink); font-family: Georgia, "Times New Roman", serif; }
  header {
    padding: 32px 40px 16px;
    border-bottom: 1px solid var(--line);
    background: var(--cream);
  }
  header h1 {
    margin: 0 0 4px;
    font-weight: 400;
    font-size: 26px;
    letter-spacing: 0.5px;
  }
  header p {
    margin: 0;
    color: var(--muted);
    font-size: 14px;
    font-family: Helvetica, Arial, sans-serif;
  }
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 40px 120px;
  }
  .product {
    margin: 28px 0;
    padding: 24px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 4px;
  }
  .product h2 {
    margin: 0 0 4px;
    font-weight: 400;
    font-size: 18px;
  }
  .product .slug {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .product .desc {
    margin: 0 0 16px;
    color: var(--muted);
    font-size: 13px;
    font-family: Helvetica, Arial, sans-serif;
  }
  .options {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }
  .option {
    border: 2px solid var(--line);
    border-radius: 4px;
    padding: 10px;
    background: var(--cream-soft);
    cursor: pointer;
    transition: border-color 0.15s ease, background 0.15s ease;
    text-align: center;
  }
  .option:hover { border-color: #d2c6ad; }
  .option.selected {
    border-color: var(--terracotta);
    background: #fff;
    box-shadow: 0 0 0 1px var(--terracotta) inset;
  }
  .option img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 2px;
    display: block;
    background: var(--cream);
  }
  .option .label {
    margin-top: 8px;
    font-family: Helvetica, Arial, sans-serif;
    font-size: 12px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .option.selected .label { color: var(--terracotta); }
  .missing {
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--cream);
    color: var(--muted);
    font-family: Helvetica, Arial, sans-serif;
    font-size: 13px;
    border-radius: 2px;
  }
  .toolbar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 16px 40px;
    background: var(--cream);
    border-top: 1px solid var(--line);
    display: flex;
    gap: 12px;
    align-items: center;
    justify-content: space-between;
  }
  .toolbar .count {
    font-family: Helvetica, Arial, sans-serif;
    font-size: 13px;
    color: var(--muted);
  }
  .toolbar button {
    font-family: Helvetica, Arial, sans-serif;
    font-size: 13px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    background: var(--ink);
    color: #fff;
    border: 0;
    padding: 12px 20px;
    border-radius: 2px;
    cursor: pointer;
  }
  .toolbar button.secondary {
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--ink);
  }
  .toolbar button:hover { background: var(--terracotta); border-color: var(--terracotta); color: #fff; }
  #json-output {
    position: fixed;
    bottom: 70px;
    right: 40px;
    width: 420px;
    max-height: 320px;
    overflow: auto;
    background: var(--ink);
    color: #f5ede0;
    padding: 16px;
    border-radius: 4px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 12px;
    white-space: pre;
    display: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.18);
  }
</style>
</head>
<body>
<header>
  <h1>Jackson & Coil shop bilde-velger</h1>
  <p>Velg beste bilde-alternativ for hvert av de 6 hus-merkede produktene. Klikk en variant, klikk "Kopier valg JSON" nederst.</p>
</header>

<main id="root"></main>

<div id="json-output"></div>

<div class="toolbar">
  <div class="count" id="count">0 / 6 valgt</div>
  <div style="display:flex; gap:12px;">
    <button class="secondary" id="toggle-json">Vis JSON</button>
    <button id="copy-json">Kopier valg JSON</button>
  </div>
</div>

<script>
const products = [
  {
    slug: "universal-hooded-diffuser",
    name: "Universal hooded diffuser",
    desc: "Hair dryer diffuser attachment, matte sort, universal fit."
  },
  {
    slug: "house-silk-pillowcase-teal",
    name: "House silk pillowcase, teal",
    desc: "Mulberry silk pillowcase, 22 momme, dyp blagron teal."
  },
  {
    slug: "house-satin-sleep-bonnet",
    name: "House satin sleep bonnet",
    desc: "Justerbar satin bonnet for natt, sort eller dyp teal."
  },
  {
    slug: "house-silk-durag",
    name: "House silk durag",
    desc: "Silke durag i dyp blagron teal, lange bind."
  },
  {
    slug: "house-tshirt-towel",
    name: "House t-shirt hair towel",
    desc: "Bomull / mikrofiber t-shirt towel for kroller, cream."
  },
  {
    slug: "house-silk-scrunchies",
    name: "House silk scrunchies, sett",
    desc: "Fire silke scrunchies: terracotta, cream, deep teal, brun."
  }
];

const sources = [
  { key: "codex", label: "Codex image_gen" },
  { key: "stock", label: "Unsplash stock" },
  { key: "lookalike", label: "Brand lookalike" }
];

const selections = {};

const root = document.getElementById("root");

function imgPath(slug, src) {
  return `shop-images-v2/${slug}-${src}.jpg`;
}

function render() {
  root.innerHTML = "";
  for (const p of products) {
    const card = document.createElement("section");
    card.className = "product";
    card.innerHTML = `
      <h2>${p.name}</h2>
      <div class="slug">${p.slug}</div>
      <p class="desc">${p.desc}</p>
      <div class="options" data-slug="${p.slug}"></div>
    `;
    const grid = card.querySelector(".options");
    for (const s of sources) {
      const opt = document.createElement("div");
      opt.className = "option";
      if (selections[p.slug] === s.key) opt.classList.add("selected");
      opt.dataset.src = s.key;
      const path = imgPath(p.slug, s.key);
      opt.innerHTML = `
        <img src="${path}" alt="${p.name} ${s.label}"
             onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'missing',textContent:'TODO ' + this.alt}))">
        <div class="label">${s.label}</div>
      `;
      opt.addEventListener("click", () => {
        selections[p.slug] = s.key;
        render();
        updateCount();
        updateJsonView();
      });
      grid.appendChild(opt);
    }
    root.appendChild(card);
  }
}

function updateCount() {
  const n = Object.keys(selections).length;
  document.getElementById("count").textContent = `${n} / ${products.length} valgt`;
}

function buildJson() {
  const out = {};
  for (const p of products) {
    out[p.slug] = selections[p.slug] || null;
  }
  return JSON.stringify(out, null, 2);
}

function updateJsonView() {
  const el = document.getElementById("json-output");
  if (el.style.display === "block") el.textContent = buildJson();
}

document.getElementById("copy-json").addEventListener("click", async () => {
  const txt = buildJson();
  try {
    await navigator.clipboard.writeText(txt);
    const btn = document.getElementById("copy-json");
    const orig = btn.textContent;
    btn.textContent = "Kopiert";
    setTimeout(() => (btn.textContent = orig), 1500);
  } catch (e) {
    const el = document.getElementById("json-output");
    el.style.display = "block";
    el.textContent = txt;
  }
});

document.getElementById("toggle-json").addEventListener("click", () => {
  const el = document.getElementById("json-output");
  if (el.style.display === "block") {
    el.style.display = "none";
  } else {
    el.style.display = "block";
    el.textContent = buildJson();
  }
});

render();
updateCount();
</script>
</body>
</html>
