                - generic:
                  - paragraph:
                    - emphasis: Stylist
                  - paragraph: Meet Nia, the stylist who is passionate about empowering her clients to love their hair.
                  - paragraph: Nia’s passion for curls started the moment after her first big chop. “Learning to love my curls led me to love myself. This salon is an extension of me and my love for natural hair. I am extremely passionate about seeing women leave the salon feeling empowered, heard and beautiful.”
                  - paragraph: Nia specialises in bespoke curl by curl cuts to create shapes that enhance her clients needs as well as coily hair styling techniques for definition and volume.
                  - paragraph:
                    - strong: "LANGUAGES SPOKEN:"
                    - text: Shona and English
                  - paragraph:
