                - generic:
                  - paragraph:
                    - emphasis: Stylist
                  - paragraph: Meet Andrina, our calm and cool stylist.
                  - paragraph: She has been dedicated to making women and men feel good about their hair for 15 year.
                  - paragraph:
                    - emphasis: “I’ve always had a passion for natural hair, the healthier the better.”
                    - text: I believe that a woman’s hair is her crown and she should wear it proudly. I want woman to leave my chair feeling like a brand new woman as their hair is an extension of them.
                  - paragraph: Be prepared for Andrina to give you and your hair a luxurious and calm experience.
                  - paragraph:
                    - strong: "BEST FOR:"
                    - text: Big hair, layers and big transformations
