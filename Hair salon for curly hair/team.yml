                - generic:
                  - paragraph:
                    - emphasis: Stylist
                  - paragraph: Meet Mia, our chill and cool stylist.
                  - paragraph: Mia is passionate about empowering her clients to embrace their natural texture.
                  - paragraph: Mia's journey began with her own hair.
                  - paragraph:
                    - emphasis: "\"I once struggled with embracing my natural texture, trying to hide the frizz, but through education and care, I’ve come to embrace, enhance and celebrate my curly hair. My goal is to help my clients feel seen, heard and beautiful just as they are.”"
                  - paragraph: Mia specializes in lived-in waves and curly hair techniques, shag layering, and precision cuts for volume and movement. She also excels at dimensional colouring to enhance natural texture.
                  - paragraph:
                    - strong: "BEST FOR:"
                    - text: Waves and curly hair, shag layering, adding volume, dimensional colouring.
                  - paragraph
