                  - paragraph:
                    - emphasis: Stylist
                  - paragraph: Meet Niah, a warm soul from the States who has a passion for all things hair, especially tighter textures.
                  - paragraph: With a motto of ‘The bigger, the better’, Niah is on a mission to empower her clients to embrace their natural beauty. She is dedicated to educate, and teach her clients about proper hair care and the importance of embracing what God has graced them with.
                  - paragraph: Niah’s goal is to create a safe space for women to learn and feel beautiful. She specializes in curly cuts and a wide range of diverse styling techniques, honing her skills through training with CutitKinky. With Niah, you'll not only leave with fabulous hair but a newfound confidence in your unique beauty.
                  - paragraph:
                    - strong: "BEST FOR:"
                    - text: Shaping, Cut it Kinky cuts, tight curl setting and two strand twists.
