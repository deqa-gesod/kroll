            - paragraph [ref=e213]: Wave. The S-shape. Sigrid's hair. Often misdiagnosed as “straight but frizzy” by stylists who only read it under tension.
          - generic [ref=e214]:
            - paragraph [ref=e215]: Type 3
            - paragraph [ref=e216]: Spiral. Defined ringlets. The DevaCut category. Heaviness at the root and the temple is where most stylists get this one wrong.
          - generic [ref=e217]:
            - paragraph [ref=e218]: Type 4
            - paragraph [ref=e219]: Coil. The Z-pattern. Amara's hair, Daniel's hair. Built for volume and density. The category most Oslo salons quietly turn away — and the one we built for first.
          - generic [ref=e220]:
            - paragraph [ref=e221]: Mixed pattern
            - paragraph [ref=e222]: Most heads. A 3B canopy over a 4A nape, a 2C crown over a 3A side. The Map step exists because of this.
      - generic [ref=e225]:
        - paragraph [ref=e226]: Why dry
        - generic [ref=e227]:
          - heading "Wet hair is a different shape than your hair." [level=2] [ref=e228]
          - generic [ref=e229]:
            - paragraph [ref=e230]: A Type 4 coil cut wet, under tension, comes back at half the length when it dries. A Type 2 wave cut wet, brushed straight, comes back too short on the canopy and unbalanced through the nape. The hair returns to its pattern; the cut should have been built for that pattern in the first place.
            - paragraph [ref=e231]: Dry-cutting is slower, harder, and the reason most stylists don't offer it. It is also the only way to cut for a curl pattern instead of against one. We learned it at Curl Bar, refined it at Devachan and Hair Rules, and we don't deviate from it.
      - generic [ref=e233]:
        - generic [ref=e234]:
          - paragraph [ref=e235]: For men
          - heading "Same five steps. Sharper edges." [level=2] [ref=e236]
        - generic [ref=e238]:
          - paragraph [ref=e239]: The Sculpt Cut takes the same assessment, the same zone map, the same dry curl-by-curl work on top — and brings clipper precision in for the fade and lineup. One chair. One appointment. The fade and the coils are not two separate skills handed to two separate people. That is the entire point.
          - list [ref=e240]:
            - listitem [ref=e241]: Sculpt
