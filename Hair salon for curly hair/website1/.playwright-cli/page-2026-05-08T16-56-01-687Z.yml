        - paragraph [ref=e136]: Andre Walker — Oprah's stylist for twenty-five years — published this typology in 1997. It is not the whole truth (most heads carry two or three patterns at once, and porosity matters as much as type), but it is the shared vocabulary the curl world uses. We read it on day one, in front of the mirror, with you. Then we get to work.
