            - img "Dry curl-by-curl cutting in progress" [ref=e96]
            - generic [ref=e97]:
              - paragraph [ref=e98]: Step three — Cut
              - heading "Curl by curl. Dry. Never under tension." [level=3] [ref=e99]
              - paragraph [ref=e100]: Each curl is taken individually, on its own pattern, never stretched between fingers, never wet. The shape is built from the springback, not against it. This is the slowest part of the appointment and the part the work depends on.
              - list [ref=e101]:
                - listitem [ref=e102]: Dry-cut
                - listitem [ref=e103]: Curl-by-curl
                - listitem [ref=e104]: Springback shape
