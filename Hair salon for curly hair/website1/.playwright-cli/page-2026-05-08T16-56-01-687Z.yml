              - paragraph [ref=e72]: Step one — Assess
              - heading "Read the hair before you touch it." [level=3] [ref=e73]
              - paragraph [ref=e74]: Dry. On the natural pattern. We read curl type, density, porosity, and growth direction before scissors come out — and we write it down. The same hair on a different day will tell a different story; we cut what's actually in front of us, not the photograph from your last appointment.
