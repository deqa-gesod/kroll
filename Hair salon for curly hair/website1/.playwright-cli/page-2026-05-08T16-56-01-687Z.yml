            - generic [ref=e110]:
              - paragraph [ref=e111]: Step four — Finish
              - heading "Style it the way you'll style it." [level=3] [ref=e112]
              - paragraph [ref=e113]: Cleanse, condition, leave-in, definition product. Whatever the routine is, it's the one you can buy on your way out and recreate on a Tuesday morning before work. We don't do salon-only finishes that need three products you can't get in Norway.
