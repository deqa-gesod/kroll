            - generic [ref=e83]:
              - paragraph [ref=e84]: Step two — Map
              - heading "Different rules for different zones." [level=3] [ref=e85]
              - paragraph [ref=e86]: We mark four zones — canopy, underlayer, nape, temple — and the cut takes a different rule in each. The canopy frames; the underlayer holds the shape; the nape sets the silhouette; the temple is where the lineup lives. The map is what makes the same haircut work on Type 2A and Type 4C.
              - list [ref=e87]:
