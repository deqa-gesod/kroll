    - generic [ref=e150]:
      - generic [ref=e151]:
        - paragraph [ref=e152]: First visit
        - heading "What to do with your hair before you come." [level=2] [ref=e153]
        - paragraph [ref=e154]: We cut dry, on the natural pattern. That means the hair you arrive with is the hair we cut — so the prep is half the appointment. Read this once. It saves us both an hour.
      - generic [ref=e155]:
        - generic [ref=e156]:
          - text: "01"
          - heading "Arrive with dry hair." [level=3] [ref=e157]
          - paragraph [ref=e158]: Completely dry, completely detangled, in its natural state. We need to see the curl pattern doing what it does on a normal day — not what it does ten minutes after a shower.
        - generic [ref=e159]:
          - text: "02"
          - heading "No hats, clips, braids — 24 hours before." [level=3] [ref=e160]
          - paragraph [ref=e161]: Anything that compresses or splits the hair gives us a false read. If it's raining, hood up but loose. If you slept in a bonnet, that's fine — just take it off before you arrive, not after you sit down.
        - generic [ref=e162]:
          - text: "03"
          - heading "Wash the day before, not the morning of." [level=3] [ref=e163]
          - paragraph [ref=e164]: Day-two hair shows us the actual pattern better than freshly-washed hair. If you usually use a leave-in or curl cream, use the one you always use — we want to see your hair on its normal routine, not a special occasion.
        - generic [ref=e165]:
          - text: "04"
          - heading "Allow 60 to 90 minutes." [level=3] [ref=e166]
          - paragraph [ref=e167]: Wear something comfortable. We work standing, you sit; appointments often run a touch over while we finish properly rather than rush the last ten percent. The first visit includes the free 15-minute consultation built in.
        - generic [ref=e168]:
          - text: "05"
          - heading "Bring product references." [level=3] [ref=e169]
          - paragraph [ref=e170]: If you have go-to brands you actually love — Bread, Pattern, Bouclème, whatever — tell us, or bring the bottle. Half the consultation is matching the cut to the routine you already keep.
        - generic [ref=e171]:
          - text: "06"
          - heading "Tell us what you're scared of." [level=3] [ref=e172]
          - paragraph [ref=e173]: Most people show up with something. "Last time someone took off too much." "My hair always looks flat at the back." "I'm not sure if you cut my pattern." Say it before we start. It changes the whole appointment.
    - generic [ref=e176]:
      - generic [ref=e177]:
        - paragraph [ref=e178]: Day-of
        - heading "If you're early, here's where to go." [level=2] [ref=e179]
        - paragraph [ref=e180]: Grünerløkka has more good coffee per square metre than anywhere in Oslo. We've kept this list short and biased.
      - list [ref=e182]:
        - listitem [ref=e183]:
          - generic [ref=e184]:
            - paragraph [ref=e185]: Tim Wendelboe
            - paragraph [ref=e186]: Coffee — 3 minutes east
          - paragraph [ref=e187]: If your appointment is at 11, get a flat white at 10:30 and read on the bench outside. The bar inside is loud at peak hours.
        - listitem [ref=e188]:
          - generic [ref=e189]:
            - paragraph [ref=e190]: Talormade
            - paragraph [ref=e191]: Ice cream — 2 minutes south
          - paragraph [ref=e192]: After, not before. The brown butter is the answer. They open at 12:00.
        - listitem [ref=e193]:
          - generic [ref=e194]:
            - paragraph [ref=e195]: Nedre Foss Gård
            - paragraph [ref=e196]: Lunch — 6 minutes north along Akerselva
          - paragraph [ref=e197]: If you've made a half-day of it. River-side, slow service in a good way.
        - listitem [ref=e198]:
          - generic [ref=e199]:
            - paragraph [ref=e200]: Olaf Ryes plass
            - paragraph [ref=e201]: The square — 2 minutes south
          - paragraph [ref=e202]: Bench, tree, people-watching, free. The honest answer for most clients.
