        - generic [ref=e134]:
          - paragraph [ref=e135]: Parking
          - paragraph [ref=e136]: Street parking on Markveien is metered weekdays until 17:00. The Olaf Ryes plass underground garage is two minutes south. Most of our clients come by tram or bike — it's faster.
        - generic [ref=e137]:
          - paragraph [ref=e138]: Cycling
