  - main [ref=e26]:
    - generic [ref=e28]:
      - paragraph [ref=e29]: About — Vanessa Jackson
      - heading "The salon is what happens when she stops borrowing chairs." [level=1] [ref=e30]
      - paragraph [ref=e31]: Jackson & Coil is the salon Vanessa Jackson spent seven years in Oslo not opening. This is how she got here, and what she promises to the chair.
    - generic [ref=e34]:
      - img "Founder Vanessa Jackson, portrait against cream backdrop" [ref=e35]
      - generic [ref=e36]: Vanessa Jackson, founder
    - generic [ref=e37]:
      - generic [ref=e39]:
        - paragraph [ref=e40]: Tottenham, kitchen, Saturday morning
        - generic [ref=e41]:
          - paragraph [ref=e42]: Vanessa grew up in Tottenham, North London, the youngest daughter of Jamaican parents who ran a small Caribbean grocery on Bruce Grove. Her hair was 4a. Her grandmother did it every Saturday morning at the kitchen table — hot-comb on the gas hob, coconut oil, the smell of burned newspaper on the windowsill.
          - paragraph [ref=e43]: By the time she was sixteen she was doing the hair of every girl in her year for ten quid and a Lucozade. By eighteen she'd worked out that the thing she'd been doing for free at kitchen tables was a craft people in actual salons hadn't bothered to learn.
      - img "Close-up of hands working through Type 4 coils" [ref=e46]
      - generic [ref=e48]:
        - paragraph [ref=e49]: London, then New York, then back
        - generic [ref=e50]:
          - paragraph [ref=e51]: She trained formally at Curl Bar London under Michelle Sultan. Then she crossed to New York for a year — the original Devachan, then a season studying with Anthony Dickey at Hair Rules. Two of the rooms where the modern art of curl-cutting was being written.
          - paragraph [ref=e52]: "She came back to London with one clear opinion: that the binary the industry insisted on — Black hair in one shop, everything else in another — was a failure of craft, not of biology. Curl is curl. The technique is the same. The knowledge is the part you go and get."
      - blockquote [ref=e54]:
        - paragraph [ref=e55]: “Every curl pattern is the same job done with knowledge — and knowledge is something you go and get, not something you wait for.”
        - generic [ref=e56]: — Vanessa Jackson
      - generic [ref=e58]:
        - paragraph [ref=e59]: Why Oslo, then
        - generic [ref=e60]:
          - paragraph [ref=e61]: She moved here at 28 for a Norwegian boyfriend who didn't last but a city that did. For the next seven years she worked out of a borrowed chair at three different Oslo salons — quietly building a tightly-kept client list of women and men who'd otherwise have been on flights to London or Stockholm.
          - paragraph [ref=e62]: "What she heard in those chairs, on repeat, in three languages: that nobody in this country sees this hair properly. Not really. Not at the level the hair deserves. The choice was either get on a plane every six weeks, or accept a haircut that wasn't quite right. Most people accepted it. Some cried in the car on the way home."
          - paragraph [ref=e63]: Jackson & Coil is the answer to that, in one room, on Markveien. The whole curl spectrum — Type 2A through 4C, women and men — done by stylists who actually trained for it. No kids' table. No referral up the road. No crying in the car.
    - generic [ref=e65]:
      - generic [ref=e66]:
        - paragraph [ref=e67]: What we believe
        - heading "Three things we won't argue about." [level=2] [ref=e68]
      - generic [ref=e69]:
        - generic [ref=e70]:
          - text: "01"
          - heading "Every curl pattern is the same job, done with knowledge." [level=3] [ref=e71]
          - paragraph [ref=e72]: The technique is the same. The training is the difference. We trained for all of it — Type 2A loose waves through Type 4C tight coils — and we don't have a 'specialist' page for some of it and a regular page for the rest.
        - generic [ref=e73]:
          - text: "02"
          - heading "We cut you for your curl, not against it." [level=3] [ref=e74]
          - paragraph [ref=e75]: Dry. Curl by curl. On the natural pattern. Wet-cutting and tension-stretching hide what the hair is actually doing — and that's exactly the part we need to see.
        - generic [ref=e76]:
          - text: "03"
          - heading "You leave knowing what was done and why." [level=3] [ref=e77]
          - paragraph [ref=e78]: Every appointment ends with a short education — the cut, the products, the technique you can actually recreate at home on a Tuesday morning when the salon is closed. No mystery, no dependency.
