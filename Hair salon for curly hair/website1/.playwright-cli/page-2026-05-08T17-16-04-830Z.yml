        - heading "Lean Scandinavian, warm where it counts." [level=2] [ref=e81]
        - paragraph [ref=e82]: Markveien 35. Cream walls, brass shelving, a single terracotta accent, plants, music in Vanessa's taste. Two chairs, a private styling room for clients who want one. The same playlist every visit, the same scent, the same coffee.
