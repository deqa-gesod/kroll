          - paragraph [ref=e206]: Before you come in
          - heading "Arrive dry. On the natural pattern." [level=2] [ref=e207]
          - paragraph [ref=e208]: We cut dry, on what your hair actually does — not what it does once we've stretched it under water. Coming in prepped means we get to the cut faster, and you get the time on the part that matters.
        - generic [ref=e209]:
          - generic [ref=e210]:
            - generic [ref=e211]
            - paragraph [ref=e214]: Day-2 hair tells the truth about your pattern. Day-of-wash hair lies.
          - generic [ref=e215]:
            - generic [ref=e216]
            - paragraph [ref=e219]: Wide-tooth comb on damp, conditioner-coated hair. Or fingers. Never on bone-dry hair.
          - generic [ref=e220]:
            - generic [ref=e221]
            - paragraph [ref=e224]: Leave-in is fine. Skip heavy gels, custards or mousse on the day. We need to read the curl, not the cast.
          - generic [ref=e225]:
            - generic [ref=e226]
            - paragraph [ref=e229]: Hair down, on the natural pattern, the way it sits. Imprints take ten minutes off your appointment.
          - generic [ref=e230]:
            - generic [ref=e231]
            - paragraph [ref=e234]: A photo of you on a good day, or someone with a similar pattern, helps us calibrate. Not required — useful.
          - generic [ref=e235]:
            - generic [ref=e236]
            - paragraph [ref=e239]: We hold space for the chair to be unhurried. There is rarely anyone waiting behind you.
