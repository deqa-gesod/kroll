            - generic [ref=e252]: Same. We don't relax curls. Other Oslo salons can — we are not them.
          - listitem [ref=e253]:
            - generic [ref=e254]: Wet cutting
            - generic [ref=e255]: Stretches the curl, hides the pattern, returns the wrong shape when the hair springs back. We dry-cut, always.
